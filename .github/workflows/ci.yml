name: BF Server CI

on:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://test:test@localhost:5432/test
          JWT_SECRET: test
          JWT_REFRESH_SECRET: test
