name: server-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Verify dist completeness
        run: node scripts/verify-build.js

      - name: Verify startup requires
        run: node -e "require('./dist/routes'); require('./dist/routes/auth'); require('./dist/config/env');"

      - name: Test
        run: npm run test
