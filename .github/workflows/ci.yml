name: server-ci

on:
  push:
    branches: [main]

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Verify dist completeness
        run: node scripts/verify-build.js

      - name: Verify startup requires
        run: node -e "require('./dist/routes'); require('./dist/routes/auth'); require('./dist/config/env');"

      - name: Test
        run: npm run test

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Assemble deploy package
        run: |
          mkdir deploy
          cp -r dist package.json package-lock.json node_modules deploy/

      - name: Deploy to Azure Web App
        if: github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v3
        with:
          app-name: boreal-staff-server
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
