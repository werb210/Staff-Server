name: BF Server CI

on:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run routes:export
      - name: Run tests
        run: |
          unset DATABASE_URL
          npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test
          JWT_REFRESH_SECRET: test
          OPENAI_API_KEY: dummy
          AZURE_STORAGE_CONNECTION_STRING: test
