name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 🔴 CRITICAL FIX
      - name: Clean install (fix native bindings)
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
