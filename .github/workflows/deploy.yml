name: server-deploy

on:
  push:
    branches:
      - main

concurrency:
  group: bf-server-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.10.0

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist index
        run: test -f dist/index.js

      - name: Verify startup require path
        run: node -e "require('./dist/index.js')"

      - name: Prepare production runtime payload
        run: |
          npm prune --omit=dev
          rm -rf deploy
          mkdir -p deploy
          cp -R dist deploy/dist
          cp package.json package-lock.json deploy/
          cp -R node_modules deploy/node_modules

      - name: Create deploy package
        run: |
          cd deploy
          zip -r ../dist.zip .

      - name: Guard delay before deploy
        run: sleep 15

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: boreal-staff-server
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: dist.zip
          clean: true
