name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      SCM_DO_BUILD_DURING_DEPLOYMENT: false   # 🔴 disables Azure rebuild (critical)

    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # ✅ CLEAN INSTALL
      - name: Install deps
        run: npm ci

      # ✅ BUILD LOCALLY (NOT IN AZURE)
      - name: Build
        run: npm run build

      # ✅ REMOVE DEV BLOAT (prevents zip crash)
      - name: Prune dev deps
        run: npm prune --omit=dev

      # ✅ VERIFY BUILD
      - name: Verify build
        run: |
          node scripts/verify-build.js
          node -e "require('./dist/routes'); require('./dist/routes/auth'); require('./dist/config/env');"

      # ✅ PACKAGE CLEANLY (prevents node_modules tar failure)
      - name: Create deployment package
        run: |
          zip -r release.zip . \
            -x "*.git*" \
               "node_modules/.cache/*" \
               "src/*" \
               "test/*" \
               ".github/*"

      # ✅ DEPLOY ZIP ONLY (no rebuild, no Oryx)
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: boreal-staff-server
          package: release.zip
