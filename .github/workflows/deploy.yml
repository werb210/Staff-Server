name: server-deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist completeness
        run: node scripts/verify-build.js

      - name: Verify startup requires
        run: node -e "require('./dist/routes'); require('./dist/routes/auth'); require('./dist/config/env');"

      - name: Create deploy package
        run: zip -r dist.zip dist

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: boreal-staff-server
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: dist.zip
          clean: true
