name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      SCM_DO_BUILD_DURING_DEPLOYMENT: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install deps
        run: npm ci

      - name: Clean build artifacts
        run: rm -rf dist

      - name: Build
        run: npm run build

      - name: Prune dev deps
        run: npm prune --omit=dev

      - name: Verify build
        run: |
          node scripts/verify-build.js
          node -e "require('./dist/routes'); require('./dist/routes/auth'); require('./dist/config/env');"

      - name: Create deployment package
        run: |
          zip -r release.zip . \
            -x "*.git*" \
               "node_modules/.cache/*" \
               "src/*" \
               "test/*" \
               ".github/*" \
               ".env"

      # 🔴 THIS IS THE FIX
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: boreal-staff-server
          package: release.zip
