name: Migration cold-boot
on:
  push:
    branches: [main]
    paths: ['migrations/**', 'src/startup/runMigrations.ts']
  pull_request:
    paths: ['migrations/**', 'src/startup/runMigrations.ts']
jobs:
  cold-boot:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bfuser
          POSTGRES_PASSWORD: bfpass
          POSTGRES_DB: bf_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Enable extensions
        run: |
          PGPASSWORD=bfpass psql -h 127.0.0.1 -U bfuser -d bf_test \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Cold-boot — assert failures=0
        env:
          DATABASE_URL: postgresql://bfuser:bfpass@127.0.0.1:5432/bf_test
        run: |
          node -e "
            const { runMigrations } = require('./dist/startup/runMigrations');
            runMigrations().then(({ applied, skipped, failures }) => {
              console.log('applied=' + applied + ' skipped=' + skipped + ' failures=' + failures);
              if (failures > 0) process.exit(1);
            }).catch(e => { console.error(e); process.exit(2); });
          "
      - name: Idempotency — re-run, assert applied=0
        env:
          DATABASE_URL: postgresql://bfuser:bfpass@127.0.0.1:5432/bf_test
        run: |
          node -e "
            const { runMigrations } = require('./dist/startup/runMigrations');
            runMigrations().then(({ applied, failures }) => {
              console.log('applied=' + applied + ' failures=' + failures);
              if (failures > 0 || applied > 0) process.exit(1);
            }).catch(e => { console.error(e); process.exit(2); });
          "
