name: Deploy BF Server

on:
  push:
    branches:
      - main

concurrency:
  group: bf-server-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Archive build
        run: |
          mkdir -p release
          cp -r dist package.json package-lock.json release/
          cd release
          zip -r ../release.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Force stop running app (prevents 409)
        run: |
          az webapp stop \
            --name boreal-staff-server \
            --resource-group boreal-staff-server_group || true
          sleep 10

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: boreal-staff-server
          package: release.zip

      - name: Restart app
        run: |
          az webapp start \
            --name boreal-staff-server \
            --resource-group boreal-staff-server_group
