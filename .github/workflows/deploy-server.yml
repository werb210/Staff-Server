name: Deploy BF Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: test-secret
      OPENAI_API_KEY: test-key
      OPENAI_MODEL: gpt-4o-mini
      TWILIO_ACCOUNT_SID: ACtest
      TWILIO_AUTH_TOKEN: test-token
      TWILIO_PHONE: +10000000000
      DATABASE_URL: postgres://test:test@localhost:5432/test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Type Check (FAILS BUILD IF BROKEN)
        run: npm run typecheck

      - name: Build (FAILS BUILD IF BROKEN)
        run: npm run build

      - name: Smoke test
        run: |
          node dist/index.js & sleep 5 && kill $!

      - name: Enforce architecture rules
        run: |
          echo "Checking for forbidden get* helpers..."
          grep -r "function get" src && exit 1 || echo "OK"

          echo "Checking for illegal get* function declarations..."
          grep -rE "function get[A-Z]" src && exit 1 || echo "OK"

          echo "Checking for illegal exported get* helpers..."
          grep -rE "export (const|function) get[A-Z]" src && exit 1 || echo "OK"

          echo "Checking for illegal process.env usage outside config layer..."

          VIOLATIONS=$(grep -r "process.env" src \
            | grep -v "src/config" \
            | grep -v "src/platform/env" \
            | grep -v "src/env" \
            | grep -v "src/server" || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "WARNING: process.env used outside config layer:"
            echo "$VIOLATIONS"
          else
            echo "OK"
          fi

          echo "Checking that config is used instead of process.env in business layers..."

          grep -r "process.env" src \
            | grep -E "src/(services|routes|modules|middleware|repositories)" \
            && echo "ERROR: process.env used in business logic. Use config instead." && exit 1 || echo "OK"

          echo "Checking single entrypoint..."
          test $(grep -r "app.listen" src | wc -l) -eq 1

      - name: Deploy
        run: echo "Deploy step here"
