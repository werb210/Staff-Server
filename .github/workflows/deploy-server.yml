name: Deploy BF Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Predeploy safety check
        env:
          NODE_ENV: development
          PORT: 8080
          JWT_SECRET: ci-jwt-secret-123
          JWT_REFRESH_SECRET: ci-refresh-secret-123
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
          OPENAI_API_KEY: sk-ci-test-key
          REDIS_URL: redis://127.0.0.1:6379
        run: |
          node dist/index.js &
          sleep 5
          bash scripts/predeploy.sh

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
