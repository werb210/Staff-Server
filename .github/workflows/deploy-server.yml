name: Deploy BF Server

on:
  push:
    branches:
      - main

concurrency:
  group: bf-server-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare package
        run: |
          mkdir -p release
          cp -r dist package.json package-lock.json release/
          cd release
          zip -r ../release.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get publishing profile
        id: pubprofile
        run: |
          az webapp deployment list-publishing-profiles \
            --name boreal-staff-server \
            --resource-group boreal-staff-server_group \
            --xml > publish.xml

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Extract credentials
        run: |
          USER=$(xmllint --xpath "string(//publishProfile[@publishMethod='MSDeploy']/@userName)" publish.xml)
          PASS=$(xmllint --xpath "string(//publishProfile[@publishMethod='MSDeploy']/@userPWD)" publish.xml)
          echo "KUDU_USER=$USER" >> $GITHUB_ENV
          echo "KUDU_PASS=$PASS" >> $GITHUB_ENV

      - name: Deploy via Kudu ZIP (no OneDeploy)
        run: |
          curl -X POST \
            -u "$KUDU_USER:$KUDU_PASS" \
            --data-binary @release.zip \
            https://boreal-staff-server.scm.azurewebsites.net/api/zipdeploy

      - name: Restart app
        run: |
          az webapp restart \
            --name boreal-staff-server \
            --resource-group boreal-staff-server_group
